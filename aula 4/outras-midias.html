<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outras midias no HTML5</title>
</head>
<body>
    <header>
        <h1>Outras midias no HTML5</h1>
    </header>
    <main>
        <section>

            <!-- Importando audio local -->
            <h2>Audio</h2>
            <audio controls src="midias/audio.mp3">
            </audio>

            <!-- Importando video local -->
            <h2>Video</h2>
            <video controls src="midias/video.mp4" type="Video/mp4" width="400px">
                Video não encontrado ou não suportado
            </video>

            <!-- Importando video do Youtube -->
            <h2>Video do Youtube (externo) - iFrame </h2>
            <iframe 
                src="" 
                title="Exemplo de video do Youtube"
                width="560"
                height="315"
                frameborder="0">
            </iframe>

        </section>
    </main>

</body>
</html>
