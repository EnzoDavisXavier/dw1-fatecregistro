<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Cadastro de Aluno - Curso DSM</title>
</head>
<body>
        <h1>Formulário de Cadastro</h1>
        <p>Preencha o formulário para realizar seu cadastro no curso de DSM</p>

        <form action="#" method="POST">

            <fieldset>

                <legend>Dados Pessoais</legend>

                <label for="nome">Nome completo:</label><br>
                <input type="text" id="nome" name="nome" placeholder="Insira seu nome completo" required><br>

                <label for="email">E-mail:</label><br>
                <input type="email" id="email" name="email" placeholder="Insira seu e-mail" required><br>

                <label for="data">Data de nascimento:</label><br>
                <input type="date" id="data" name="data" required><br>

            </fieldset>

            <fieldset>

                <legend>Dados Acadêmicos</legend>

                <label for="curso">Curso:</label><br>
                <select name="curso" id="curso">
                    <option value="DSM">DSM</option>
                    <option value="GE">Gestão Empresarial</option>
                    <option value="Outro">Outro</option>
                </select>

                <p>Período:</p>

                <input type="radio" name="periodo" id="manha" value="manha">
                <label for="manha">Manhã</label>

                <input type="radio" name="periodo" id="noite" value="noite">
                <label for="noite">Noite</label><br><br>

                <label for="obs">Observações:</label><br>
                <textarea rows="4" cols="40" name="obs" id="obs" placeholder="Escreva aqui suas observações"></textarea><br>

            </fieldset>

            <button type="submit">Enviar</button>
            <button type="reset">Limpar</button>

        </form>
</body>
</html>
